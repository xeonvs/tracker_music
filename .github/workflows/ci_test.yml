name: CI_tests
on:
  pull_request:
  workflow_dispatch:

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: sudo apt-get update && sudo apt-get install -y shellcheck eslint jq
      - run: pip install playwright
      - run: playwright install --with-deps chromium
      - run: ./tests/test.sh
